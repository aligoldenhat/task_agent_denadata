services:
  app:
    build:
      context: .
      dockerfile: docker/chat.Dockerfile
    ports:
      - "8001:8000"
    env_file:
      - .env
    environment:
      DB_PATH: /app/data/memory.db
      LOG_PATH: /app/logs/app.log
      TASK_CSV: /app/data/tasks.csv
      USERS_CSV: /app/data/users.csv
    volumes:
      - app_data:/app/data
      - app_logs:/app/logs

      - ./src:/app/src
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  app_data:
  app_logs:
